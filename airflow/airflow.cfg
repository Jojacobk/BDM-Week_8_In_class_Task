# Partial overrides. The full effective config comes from the apache/airflow:2.9.x
# image defaults; values below are also set as AIRFLOW__* env vars in docker-compose.yaml
# (env vars take precedence). Kept here for documentation and ease of inspection.

[core]
executor = LocalExecutor
load_examples = False
dags_folder = /opt/airflow/dags
dags_are_paused_at_creation = False

[scheduler]
# Tuned for "edit YAML -> see DAG in UI" responsiveness (default 30 is too slow
# for the workshop's Phase 1 magic moment).
min_file_process_interval = 5
parsing_processes = 2

[webserver]
expose_config = True

[api]
auth_backends = airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
