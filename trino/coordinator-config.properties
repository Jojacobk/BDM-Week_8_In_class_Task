# Single-node Trino: coordinator that also schedules its own tasks.
# The trinodb/trino image ships with these as defaults; this file is kept
# for spec compliance (§T01) and as documentation of the expected config.
coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://localhost:8080
query.max-memory=1GB
query.max-memory-per-node=512MB
