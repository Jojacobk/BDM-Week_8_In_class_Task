# Maria's table replication config.
# Add a new table = add a new entry here. The factory does the rest.
tables:
  - name: prd.users
    engine: spark              # which TableEngine to use; defaults to spark
    primary_key: user_id
    source_path: /opt/data/source/users/
    critical_columns: [user_id, email, created_at]
    freshness_sla_hours: 6
    severity: critical


  - name: prd.orders
    engine: spark
    primary_key: order_id
    source_path: /opt/data/source/orders/
    critical_columns: [order_id, user_id, amount, created_at]
    freshness_sla_hours: 6
    severity: warning

  - name: prd.events
    engine: spark
    primary_key: event_id
    source_path: /opt/data/source/events/
    critical_columns: [event_id, user_id, event_type, occurred_at]
    freshness_sla_hours: 12
    severity: warning
